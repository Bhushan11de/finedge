version: "3.8"

services:
  mysql:
    container_name: mysql
    image: mysql:latest
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 1999
      MYSQL_DATABASE: stockman  # Ensure the database name matches the URL in the application
    networks:
      - bhushan
    volumes:
      - mysql-data:/var/lib/mysql  # Keeps MySQL data persistent across container restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1999"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  finedge:
    container_name: finedge
    image: bhushanshub/finedge:latest
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/stockman"  # URL should match MySQL container name
      SPRING_DATASOURCE_PASSWORD: 1999
    networks:
      - bhushan
    depends_on:
      - mysql  # Ensures MySQL starts before finedge
    restart: on-failure  # Only restart on failure, instead of always
    volumes:
      - mysql-data:/var/lib/mysql  # Shared volume to persist data

networks:
  bhushan:

volumes:
  mysql-data:
