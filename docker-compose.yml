version: "3.8"

services:
  mysql:
    container_name: mysql
    image: mysql:latest
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 1999
      MYSQL_DATABASE: stockman
    networks:
      - bhushan
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always  # ✅ Ensure correct indentation
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1999"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  finedge:
    container_name: finedge
    image: bhushanshub/finedge:latest
    ports:
      - 8088:8088
    environment:
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/stockman"
      SPRING_DATASOURCE_PASSWORD: 1999
    networks:
      - bhushan
    depends_on:
      mysql:
        condition: service_healthy  # ✅ Ensures MySQL is ready before finedge starts
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql

networks:
  bhushan:

volumes:
  mysql-data:

