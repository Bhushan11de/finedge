# Database Properties
spring.datasource.url=jdbc:mysql://mysql:3306/stockman?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1999

# ORM Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Spring Boot Server
server.port=8088
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# Info Metadata
info.version=1.0.0
info.title=My API title
info.description=Awesome description
